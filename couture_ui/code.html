<div class="absolute bottom-0 left-0 w-full z-40 md:w-1/2 md:left-1/4 pb-0 md:pb-margin-tablet">

<span class="material-symbols-outlined text-primary-container" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>

<div class="grid grid-cols-2 gap-y-8 gap-x-6">

<div class="flex items-baseline gap-1">

<span class="font-body-md text-body-md text-tertiary">cm</span>
</div>
</div>
<div class="flex flex-col gap-1">
